name: GreenthumbStreak
options:
  bundleIdPrefix: com.shimondeitel.greenthumbstreak
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  GreenthumbStreak:
    type: application
    platform: iOS
    sources:
      - path: GreenthumbStreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.greenthumbstreak
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: GreenthumbStreak/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GreenthumbStreakTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GreenthumbStreakTests
      - path: GreenthumbStreak.storekit
    dependencies:
      - target: GreenthumbStreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.greenthumbstreak.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GreenthumbStreakUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GreenthumbStreakUITests
    dependencies:
      - target: GreenthumbStreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.greenthumbstreak.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  GreenthumbStreak:
    build:
      targets:
        GreenthumbStreak: all
        GreenthumbStreakTests: [test]
        GreenthumbStreakUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: GreenthumbStreak.storekit
    test:
      config: Debug
      storeKitConfiguration: GreenthumbStreak.storekit
      targets:
        - GreenthumbStreakTests
        - GreenthumbStreakUITests
    archive:
      config: Release
